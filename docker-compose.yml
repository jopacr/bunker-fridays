# Local Postgres for development. Start it with:  docker compose up -d
# Then, from server/:  npm install && npm run migrate && npm run seed:admin you@venue.com "a strong password" && npm start
services:
  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: bunker
      POSTGRES_PASSWORD: bunker
      POSTGRES_DB: bunker
    ports:
      - "5432:5432"
    volumes:
      - bunker_pgdata:/var/lib/postgresql/data

volumes:
  bunker_pgdata:
